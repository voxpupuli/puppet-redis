---
redis::provider: 'redis'

redis::config_dir_mode: '0750'
redis::config_dir: '/etc/%{lookup("redis::provider")}'
redis::config_file_orig: '%{lookup("redis::config_file")}.puppet'
redis::config_file: '%{lookup("redis::config_dir")}/%{lookup("redis::provider")}.conf'
redis::config_group: 'root'
redis::config_owner: '%{lookup("redis::provider")}'
redis::daemonize: true
redis::log_dir_mode: '0750'
redis::log_dir: '/var/log/%{lookup("redis::provider")}'
redis::log_file: '%{lookup("redis::provider")}.log'
redis::package_name: '%{lookup("redis::provider")}'
redis::pid_file: '/var/run/%{lookup("redis::provider")}/%{lookup("redis::provider")}-server.pid'
redis::service_group: '%{lookup("redis::provider")}'
redis::service_name: '%{lookup("redis::provider")}'
redis::service_user: '%{lookup("redis::provider")}'
redis::unixsocket: '/var/run/%{lookup("redis::provider")}/%{lookup("redis::provider")}.sock'
redis::workdir: '/var/lib/%{lookup("redis::provider")}'
redis::dnfmodule::module: '%{lookup("redis::provider")}'

redis::sentinel::config_file_orig: '%{lookup("redis::sentinel::config_file")}.puppet'
redis::sentinel::config_file: '%{lookup("redis::config_dir")}/sentinel.conf'
redis::sentinel::config_group: '%{alias("redis::config_group")}'
redis::sentinel::config_owner: '%{alias("redis::config_owner")}'
redis::sentinel::daemonize: true
redis::sentinel::log_file: '%{lookup("redis::log_dir")}/sentinel.log'
redis::sentinel::package_name: '%{lookup("redis::provider")}'
redis::sentinel::pid_file: '/var/run/%{lookup("redis::provider")}/%{lookup("redis::provider")}-sentinel.pid'
redis::sentinel::service_group: '%{alias("redis::service_group")}'
redis::sentinel::service_name: '%{lookup("redis::provider")}-sentinel'
redis::sentinel::service_user: '%{alias("redis::service_user")}'
redis::sentinel::working_dir: '/tmp'
